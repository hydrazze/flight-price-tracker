name: Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"


      - name: Install uv
        uses: astral-sh/setup-uv@v5


      - name: Install dependencies
        run: uv sync


      - name: Run tests
        env:
          BOT_TOKEN: "123456789:AA123456789012345678901234567890123"
          TRAVELPAYOUTS_API_KEY: "test_api_key"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        run: uv run pytest
