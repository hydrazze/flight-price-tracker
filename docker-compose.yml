version: "3.9"

services:
  bot:
    build: .
    container_name: flight-price-tracker-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    container_name: flight-price-tracker-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: flight_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flight_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
